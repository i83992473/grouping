# AWS Amplify Hosting — build the Vite app and publish `dist/`.
# In the Amplify console, connect this GitHub repo and use the default branch.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
